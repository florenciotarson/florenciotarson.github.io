<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar Repositórios no GitHub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #f0f6fc;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      max-width: 680px;
      margin: 0 auto 2rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #58a6ff; }

    .search-box button {
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      border: none;
      background: #238636;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { background: #2ea043; }
    .search-box button:disabled { background: #21262d; color: #8b949e; cursor: default; }

    #status {
      text-align: center;
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      min-height: 1.2em;
    }

    .results {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .repo-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      transition: border-color 0.2s;
    }

    .repo-card:hover { border-color: #58a6ff; }

    .repo-card a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .repo-card a:hover { text-decoration: underline; }

    .repo-desc {
      color: #8b949e;
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .repo-meta {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.7rem;
      font-size: 0.82rem;
      color: #8b949e;
      flex-wrap: wrap;
    }

    .repo-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .star { color: #e3b341; }
    .fork { color: #8b949e; }
    .lang-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f1e05a;
      display: inline-block;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .pagination button {
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .pagination button:hover:not(:disabled) { border-color: #58a6ff; background: #1f2937; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 2.5rem;
      color: #8b949e;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover { color: #c9d1d9; }
  </style>
</head>
<body>
  <h1>🔍 Buscar Repositórios no GitHub</h1>
  <p class="subtitle">Pesquisa em todos os repositórios públicos do GitHub</p>

  <div class="search-box">
    <input type="text" id="query" placeholder="Ex: machine learning, react, python…" autocomplete="off" />
    <button id="searchBtn" onclick="doSearch(1)">Buscar</button>
  </div>

  <div id="status"></div>
  <div class="results" id="results"></div>
  <div class="pagination" id="pagination"></div>

  <a class="back-link" href="/">← Voltar para a página inicial</a>

  <script>
    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      Java: '#b07219', 'C++': '#f34b7d', C: '#555555', 'C#': '#178600',
      PHP: '#4F5D95', Ruby: '#701516', Go: '#00ADD8', Rust: '#dea584',
      Swift: '#F05138', Kotlin: '#A97BFF', HTML: '#e34c26', CSS: '#563d7c',
      Shell: '#89e051', Dart: '#00B4AB', Scala: '#c22d40', R: '#198CE7',
    };

    let currentPage = 1;
    let currentQuery = '';

    const queryInput = document.getElementById('query');

    queryInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doSearch(1);
    });

    async function doSearch(page) {
      const q = queryInput.value.trim();
      if (!q) return;

      currentQuery = q;
      currentPage = page;

      const btn = document.getElementById('searchBtn');
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      const paginationEl = document.getElementById('pagination');

      btn.disabled = true;
      statusEl.textContent = 'Buscando…';
      if (page === 1) {
        resultsEl.innerHTML = '';
        paginationEl.innerHTML = '';
      }

      try {
        const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&sort=stars&order=desc&per_page=10&page=${page}`;
        const res = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });

        if (res.status === 403) {
          statusEl.textContent = 'Limite de requisições da API atingido. Tente novamente em alguns minutos.';
          btn.disabled = false;
          return;
        }

        if (!res.ok) {
          statusEl.textContent = `Erro ao buscar: ${res.status} ${res.statusText}`;
          btn.disabled = false;
          return;
        }

        const data = await res.json();
        const total = data.total_count;

        if (total === 0) {
          statusEl.textContent = 'Nenhum repositório encontrado.';
          resultsEl.innerHTML = '';
          paginationEl.innerHTML = '';
          btn.disabled = false;
          return;
        }

        // GitHub Search API limits pagination to 1000 results (100 pages × 10 per page)
        const totalPages = Math.min(Math.ceil(total / 10), 100);
        statusEl.textContent = `${total.toLocaleString('pt-BR')} repositórios encontrados — página ${page} de ${totalPages}`;

        resultsEl.innerHTML = data.items.map(repo => {
          const lang = repo.language || '';
          const dot = lang
            ? `<span class="lang-dot" style="background:${LANG_COLORS[lang] || '#8b949e'}"></span> ${escHtml(lang)}`
            : '';
          const desc = repo.description ? `<p class="repo-desc">${escHtml(repo.description)}</p>` : '';
          return `
            <div class="repo-card">
              <a href="${escHtml(repo.html_url)}" target="_blank" rel="noopener noreferrer">${escHtml(repo.full_name)}</a>
              ${desc}
              <div class="repo-meta">
                ${dot ? `<span>${dot}</span>` : ''}
                <span class="star">★ ${repo.stargazers_count.toLocaleString('pt-BR')}</span>
                <span class="fork">⑂ ${repo.forks_count.toLocaleString('pt-BR')}</span>
              </div>
            </div>`;
        }).join('');

        paginationEl.innerHTML = `
          <button onclick="doSearch(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Anterior</button>
          <button onclick="doSearch(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Próxima →</button>`;

      } catch (err) {
        statusEl.textContent = 'Falha na conexão. Verifique sua internet e tente novamente.';
      }

      btn.disabled = false;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
